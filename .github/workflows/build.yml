name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK (command line tools)
        run: |
          mkdir -p android-sdk/cmdline-tools
          cd android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          echo "ANDROID_HOME=$PWD" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$PWD" >> $GITHUB_ENV

      - name: Accept SDK licenses
        run: yes | android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Build server module
        run: |
          chmod +x easycontrol/gradlew
          cd easycontrol && ./gradlew :server:build -x test

      - name: Build app APK
        run: cd easycontrol && ./gradlew :app:assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EasyControl-APK
          path: easycontrol/app/build/outputs/apk/release/*.apk